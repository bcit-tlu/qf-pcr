name: helm-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to package and publish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Parse release tag
        id: parse
        shell: bash
        env:
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.parse.outputs.publish == 'true'

      - uses: azure/setup-helm@v5
        if: steps.parse.outputs.publish == 'true'

      - uses: sigstore/cosign-installer@v3
        if: steps.parse.outputs.publish == 'true'

      - name: Cosign login (OCI)
        if: steps.parse.outputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | \
            cosign login "${REGISTRY}" \
            -u "${ACTOR}" \
            --password-stdin

      - name: Helm login (OCI)
        if: steps.parse.outputs.publish == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | \
            helm registry login "${REGISTRY}" \
            -u "${ACTOR}" \
            --password-stdin

      - name: Package and push chart
        id: push
        if: steps.parse.outputs.publish == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          OCI_REPO: oci://${{ env.REGISTRY }}/${{ github.repository }}/charts
        run: |
          set -euo pipefail

          CHART_DIR="charts"
          DEST_DIR="/tmp/charts"
          CHART_NAME=$(yq '.name' "${CHART_DIR}/Chart.yaml")

          mkdir -p "${DEST_DIR}"

          helm package "${CHART_DIR}" \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            -d "${DEST_DIR}"

          PUSH_OUT=$(helm push \
            "${DEST_DIR}/${CHART_NAME}-${VERSION}.tgz" \
            "${OCI_REPO}" 2>&1) || { echo "${PUSH_OUT}"; exit 1; }
          echo "${PUSH_OUT}"

          # Tolerant digest parse: case-insensitive, allows leading whitespace.
          DIGEST=$(printf '%s\n' "${PUSH_OUT}" \
            | awk 'tolower($1)=="digest:"{print $2; exit}')
          if [[ -z "${DIGEST}" ]]; then
            echo "::error::helm push succeeded but no digest found in output (helm output format may have changed)"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "chart_name=${CHART_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sign chart
        if: steps.parse.outputs.publish == 'true' && steps.push.outputs.digest != ''
        env:
          CHART_REF: ${{ env.REGISTRY }}/${{ github.repository }}/charts/${{ steps.push.outputs.chart_name }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${CHART_REF}@${DIGEST}"
