apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qf-pcr.fullname" . }}
  labels:
    {{- include "qf-pcr.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qf-pcr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qf-pcr.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "qf-pcr.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.zoneAntiAffinity.enabled }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" (include "qf-pcr.selectorLabels" . | fromYaml)) "topologyKey" .Values.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if and (hasKey $aff "podAntiAffinity") $aff.podAntiAffinity }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if ne (toJson $aff) "{}" }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "qf-pcr.fullname" . }}-nginx
