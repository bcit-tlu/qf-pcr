replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/qf-pcr/qf-pcr
  pullPolicy: IfNotPresent
  tag: "" # Defaults to .Chart.AppVersion

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /healthz/ready
    initialDelaySeconds: 3
    periodSeconds: 5

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# ── High-availability / topology spreading ────────────────────
# When enabled, adds a required pod anti-affinity rule so that no two
# replicas land in the same topology zone (e.g. datacenter).
zoneAntiAffinity:
  enabled: false
  topologyKey: topology.kubernetes.io/zone

observability:
  openTelemetry:
    collectorEndpoint: "opentelemetry-collector.observability.svc:4318"
    
nodeSelector: {}
tolerations: []
affinity: {}
