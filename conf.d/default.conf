# Logging helpers

# Detect kubelet probes
map $http_user_agent $is_probe { default 0; ~kube-probe 1; }

# Detect error statuses
map $status $is_error { default 0; ~^[45] 1; }

# Log only failing probes
map "$is_probe:$is_error" $log_probe_fail { default 0; "1:1" 1; }

# Log non-probe traffic
map $is_probe $not_probe { 0 1; 1 0; }

# JSON access log for normal traffic
log_format json escape=json
  '{'
    '"ts":"$time_iso8601",'
    '"remote":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"rt":$request_time,'
    '"ref":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"req_id":"$request_id"'
  '}';

# Compact probe log format
log_format probe '$remote_addr - $time_local "$request" $status rt=$request_time';

# Send error logs to stderr
error_log /dev/stderr warn;

# Server
server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression (CRA does not produce .gz files, so use runtime gzip)
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_vary on;

  absolute_redirect off;
  port_in_redirect off;
  server_name_in_redirect off;

  # Access logging
  access_log /dev/stdout json  if=$not_probe;
  access_log /dev/stdout probe if=$log_probe_fail;

  # Health endpoints (exact match — highest priority)
  location = /healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"HEALTHY"}';
  }

  location = /healthz/startup {
    access_log off;
    default_type application/json;
    return 200 '{"status":"STARTUP_OK"}';
  }

  location = /healthz/ready {
    access_log off;
    default_type application/json;
    return 200 '{"status":"READY_OK"}';
  }

  # SPA shell — never cache so clients always pick up the latest asset hashes
  location = /index.html {
    add_header Cache-Control "no-cache" always;
  }

  # Long cache for hashed immutable static assets
  location ~* \.(css|js|map|jpg|jpeg|png|gif|svg|ico|mp4|woff|woff2|ttf|otf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # OTel log ingestion proxy
  # Direct proxy_pass — nginx resolves via pod DNS (CoreDNS) at startup.
  # The collector service has a stable ClusterIP so re-resolution is unnecessary.
  location = /v1/logs {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $otel_backend "opentelemetry-collector.observability.svc:4318";
    proxy_pass http://$otel_backend/v1/logs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Content-Type $content_type;
    client_max_body_size 64k;
    access_log off;
  }

  # SPA fallback — serve index.html for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Transport settings
  sendfile on;
  keepalive_timeout 65s;
}
